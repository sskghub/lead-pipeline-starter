# ============================================================
# Canonical pre-commit config for SSK public repos
# Copy this to the root of every new repo, then run:
#   pre-commit install
# After that, every `git commit` automatically runs these checks.
# ============================================================

repos:
  # ---------- Secret scanning (CRITICAL) ----------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: Block commits containing secrets

  # ---------- Basic file hygiene ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  # ---------- Python lint + format (only runs if .py files exist) ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
